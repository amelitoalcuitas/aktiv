name: Deploy to Staging

on:
  push:
    branches:
      - staging

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Connect to your Tailscale network using the Auth Key
      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTH_KEY }}

      # 2. SSH into your server and run the update script
      - name: Deploy to staging server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_TAILSCALE_IP }}
          username: deploy
          key: ${{ secrets.STAGING_SSH_KEY }}
          timeout: 60s
          command_timeout: 60m
          script: |
            set -e

            cd /home/deploy/aktiv

            # Ensure env files exist
            if [ ! -f .env.staging ]; then
              echo "ERROR: .env.staging not found"
              exit 1
            fi

            if [ ! -f backend/.env.staging ]; then
              echo "ERROR: backend/.env.staging not found"
              exit 1
            fi

            # Sync code
            git fetch origin
            git checkout staging || git checkout -b staging
            git reset --hard origin/staging

            # Load staging secrets for compose build args
            export $(grep -v '^#' /home/deploy/aktiv/.env.staging | xargs)

            # Rebuild containers cleanly
            # Note: composer install & dump-autoload are already handled in the Dockerfile
            docker compose -f docker-compose.yml -f docker-compose.staging.yml down
            docker compose -f docker-compose.yml -f docker-compose.staging.yml up -d --build

            # Laravel setup
            docker compose -f docker-compose.yml -f docker-compose.staging.yml exec -T backend php artisan migrate --force

            # Clear and rebuild cache
            docker compose -f docker-compose.yml -f docker-compose.staging.yml exec -T backend php artisan config:clear
            docker compose -f docker-compose.yml -f docker-compose.staging.yml exec -T backend php artisan cache:clear
            docker compose -f docker-compose.yml -f docker-compose.staging.yml exec -T backend php artisan config:cache
            docker compose -f docker-compose.yml -f docker-compose.staging.yml exec -T backend php artisan route:cache
            docker compose -f docker-compose.yml -f docker-compose.staging.yml exec -T backend php artisan view:cache

            echo "Staging deploy complete. Server is now on branch: $(git branch --show-current)"
