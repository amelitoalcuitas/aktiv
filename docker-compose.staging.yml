# docker-compose.staging.yml
services:
  # ─── Nginx ───────────────────────────────────────────────────────────────
  nginx:
    ports:
      - "8089:80"

  # ─── Frontend ─────────────────────────────────────────────────────────────
  frontend:
    image: aktiv-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NUXT_PUBLIC_API_BASE: https://staging.aktivhub.app/api
        NUXT_API_BASE_INTERNAL: http://nginx/api
        NUXT_PUBLIC_REVERB_HOST: staging.aktivhub.app
        NUXT_PUBLIC_REVERB_PORT: "443"
        NUXT_PUBLIC_REVERB_SCHEME: https
        NUXT_PUBLIC_REVERB_KEY: ${NUXT_PUBLIC_REVERB_KEY}
        NUXT_PUBLIC_GOOGLE_MAPS_KEY: ${NUXT_PUBLIC_GOOGLE_MAPS_KEY}
        NUXT_CLARITY_ID: ${NUXT_CLARITY_ID}
    user: "0:0"
    volumes: []
    environment: {}
    command: node .output/server/index.mjs
    restart: unless-stopped

  # ─── Backend ──────────────────────────────────────────────────────────────
  backend:
    volumes:
      - ./backend/.env.staging:/var/www/.env

  # ─── Reverb ───────────────────────────────────────────────────────────────
  reverb:
    ports: !reset []
    volumes:
      - ./backend/.env.staging:/var/www/.env

  # ─── Redis ────────────────────────────────────────────────────────────────
  redis:
    ports: !reset
      - "6380:6379"

  # ─── MinIO ────────────────────────────────────────────────────────────────
  minio:
    ports: !reset
      - "9005:9000"
      - "9006:9001"

  # ─── Workers & Scheduler ──────────────────────────────────────────────────
  queue:
    volumes:
      - ./backend/.env.staging:/var/www/.env

  scheduler:
    volumes:
      - ./backend/.env.staging:/var/www/.env