# docker-compose.staging.yml
services:
  # ─── Nginx ───────────────────────────────────────────────────────────────
  nginx:
    ports:
      - "8089:80"

  # ─── Frontend ─────────────────────────────────────────────────────────────
  frontend:
    env_file: !reset
      - ./frontend/.env.staging
    user: "root"
    command: >
      sh -c "npm install &&
             npm run build &&
             node .output/server/index.mjs"
    restart: unless-stopped

  # ─── Backend ──────────────────────────────────────────────────────────────
  backend:
    volumes:
      - ./backend/.env.staging:/var/www/.env

  # ─── Reverb ───────────────────────────────────────────────────────────────
  reverb:
    ports: !reset []
    volumes:
      - ./backend/.env.staging:/var/www/.env

  # ─── Redis ────────────────────────────────────────────────────────────────
  redis:
    ports: !reset
      - "6380:6379"

  # ─── MinIO ────────────────────────────────────────────────────────────────
  minio:
    ports: !reset
      - "9005:9000"
      - "9006:9001"

  # ─── Workers & Scheduler ──────────────────────────────────────────────────
  queue:
    volumes:
      - ./backend/.env.staging:/var/www/.env

  scheduler:
    volumes:
      - ./backend/.env.staging:/var/www/.env