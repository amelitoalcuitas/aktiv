# Inherits from docker-compose.yml but overrides ports and env
services:
  nginx:
    ports:
      - "8081:8080"   # staging on 8081, not 8080
    environment:
      - APP_ENV=staging

  backend:
    environment:
      - APP_ENV=staging
      - APP_URL=https://staging.aktivhub.app
    env_file:
      - backend/.env.staging

  frontend:
    environment:
      - NUXT_PUBLIC_API_BASE=https://staging.aktivhub.app/api
    env_file:
      - frontend/.env.staging
