services:
  # ─── Nginx ───────────────────────────────────────────────────────────────
  nginx:
    ports:
      - "8089:80" 
    environment:
      - APP_ENV=staging

  # ─── Frontend ─────────────────────────────────────────────────────────────
  frontend:
    ports: !reset
      - "3003:3000" 
    environment:
      - NODE_ENV=production
      - NUXT_PUBLIC_API_BASE=https://staging.aktivhub.app/api
      - NUXT_PUBLIC_REVERB_PORT=8085 
    env_file:
      - ./frontend/.env.staging
    user: "root" 
    command: >
      sh -c "npm install && 
             npm run build && 
             node .output/server/index.mjs"
    restart: unless-stopped

  # ─── Backend ──────────────────────────────────────────────────────────────
  backend:
    environment:
      - APP_ENV=staging
      - APP_URL=https://staging.aktivhub.app
      - AWS_URL=https://staging.aktivhub.app/minio/aktiv-media
    env_file:
      - ./backend/.env.staging
    volumes:
      - ./backend/.env.staging:/var/www/html/.env

  # ─── Reverb ───────────────────────────────────────────────────────────────
  reverb:
    ports: !reset
      - "8085:8080" 
    environment:
      - APP_ENV=staging
    volumes:
      - ./backend/.env.staging:/var/www/html/.env

  # ─── Redis ────────────────────────────────────────────────────────────────
  redis:
    ports: !reset
      - "6380:6379" 

  # ─── MinIO ────────────────────────────────────────────────────────────────
  minio:
    ports: !reset
      - "9005:9000" 
      - "9006:9001" 

  # ─── Workers & Scheduler ──────────────────────────────────────────────────
  queue:
    environment:
      - APP_ENV=staging
      - AWS_URL=https://staging.aktivhub.app/minio/aktiv-media
    env_file:
      - ./backend/.env.staging
    volumes:
      - ./backend/.env.staging:/var/www/html/.env

  scheduler:
    environment:
      - APP_ENV=staging
      - AWS_URL=https://staging.aktivhub.app/minio/aktiv-media
    env_file:
      - ./backend/.env.staging
    volumes:
      - ./backend/.env.staging:/var/www/html/.env