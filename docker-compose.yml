services:

  # ─── Nginx reverse proxy ───────────────────────────────────────────────────
  # Routes /api/* and /sanctum/* to the Laravel backend.
  # All other requests go to the Nuxt frontend.
  # Binds to host port 8080 to avoid conflict with port 80 on WSL.
  nginx:
    image: nginx:alpine
    container_name: aktiv_nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  # ─── Nuxt 3 frontend ───────────────────────────────────────────────────────
  frontend:
    image: node:20-alpine
    container_name: aktiv_frontend
    working_dir: /app
    user: "${UID:-1000}:${GID:-1000}"
    volumes:
      - ./frontend:/app
      # node_modules and .nuxt are on your local WSL filesystem.
      # This means VS Code IntelliSense and autocomplete work natively.
      # Run `npm install` in WSL inside frontend/ to install locally too.
    environment:
      - NODE_ENV=development
      - NUXT_PUBLIC_API_BASE=http://localhost:8080/api
      # Internal Docker URL used by Nuxt SSR to reach the Laravel backend
      - NUXT_API_BASE_INTERNAL=http://nginx/api
      # Bind to all interfaces inside the container so Nginx can reach it
      - NUXT_HOST=0.0.0.0
      - NUXT_PORT=3000
      - NUXT_PUBLIC_REVERB_KEY=${REVERB_APP_KEY}
      - NUXT_PUBLIC_REVERB_HOST=localhost
      - NUXT_PUBLIC_REVERB_PORT=8081
      - NUXT_PUBLIC_REVERB_SCHEME=http
    command: sh -c "npm install && npm run dev"
    expose:
      - "3000"
    restart: unless-stopped

  # ─── Laravel backend ───────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aktiv_backend
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
      # vendor/ is on your local WSL filesystem.
      # This means VS Code IntelliSense and autocomplete work natively.
      # Run `composer install` in WSL inside backend/ to install locally too.
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_URL=http://localhost:8080
      - FILESYSTEM_DISK=s3
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=${DB_DATABASE:-aktiv}
      - DB_USERNAME=${DB_USERNAME:-aktiv_user}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CACHE_DRIVER=redis
      - QUEUE_CONNECTION=redis
      - BROADCAST_CONNECTION=reverb
      - REVERB_APP_ID=${REVERB_APP_ID}
      - REVERB_APP_KEY=${REVERB_APP_KEY}
      - REVERB_APP_SECRET=${REVERB_APP_SECRET}
      - REVERB_HOST=reverb
      - REVERB_PORT=8080
      - REVERB_SCHEME=http
      - MAIL_MAILER=smtp
      - MAIL_HOST=mailpit
      - MAIL_PORT=1025
      - MAIL_USERNAME=null
      - MAIL_PASSWORD=null
      - MAIL_ENCRYPTION=null
      - MAIL_FROM_ADDRESS=hello@aktiv.local
      - MAIL_FROM_NAME=Aktiv
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_BUCKET=aktiv-media
      - AWS_ENDPOINT=http://minio:9000
      - AWS_URL=http://localhost:9000/aktiv-media
      - AWS_USE_PATH_STYLE_ENDPOINT=true
    expose:
      - "9000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    command: >
      sh -c "chown -R www-data:www-data /var/www/storage /var/www/bootstrap/cache &&
      chmod -R ug+rwX /var/www/storage /var/www/bootstrap/cache &&
      php-fpm"
    restart: unless-stopped

  # ─── Laravel Reverb (WebSocket server) ────────────────────────────────────
  reverb:
    image: aktiv-backend
    container_name: aktiv_reverb
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
    environment:
      - APP_ENV=local
      - APP_KEY=${APP_KEY}
      - APP_DEBUG=true
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=${DB_DATABASE:-aktiv}
      - DB_USERNAME=${DB_USERNAME:-aktiv_user}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - BROADCAST_CONNECTION=reverb
      - REVERB_APP_ID=${REVERB_APP_ID}
      - REVERB_APP_KEY=${REVERB_APP_KEY}
      - REVERB_APP_SECRET=${REVERB_APP_SECRET}
      - REVERB_HOST=0.0.0.0
      - REVERB_PORT=8080
      - REVERB_SCHEME=http
    command: sh -c "docker-php-ext-install pcntl && php artisan reverb:start --host=0.0.0.0 --port=8080 --no-interaction"
    ports:
      - "8081:8080"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  # ─── Laravel Queue Worker ─────────────────────────────────────────────────
  queue:
    image: aktiv-backend
    container_name: aktiv_queue
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
    environment:
      - APP_ENV=local
      - APP_KEY=${APP_KEY}
      - APP_DEBUG=true
      - APP_URL=http://localhost:8080
      - FILESYSTEM_DISK=s3
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=${DB_DATABASE:-aktiv}
      - DB_USERNAME=${DB_USERNAME:-aktiv_user}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CACHE_DRIVER=redis
      - QUEUE_CONNECTION=redis
      - BROADCAST_CONNECTION=reverb
      - REVERB_APP_ID=${REVERB_APP_ID}
      - REVERB_APP_KEY=${REVERB_APP_KEY}
      - REVERB_APP_SECRET=${REVERB_APP_SECRET}
      - REVERB_HOST=reverb
      - REVERB_PORT=8080
      - REVERB_SCHEME=http
      - MAIL_MAILER=smtp
      - MAIL_HOST=mailpit
      - MAIL_PORT=1025
      - MAIL_USERNAME=null
      - MAIL_PASSWORD=null
      - MAIL_ENCRYPTION=null
      - MAIL_FROM_ADDRESS=hello@aktiv.local
      - MAIL_FROM_NAME=Aktiv
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_BUCKET=aktiv-media
      - AWS_ENDPOINT=http://minio:9000
      - AWS_URL=http://localhost:9000/aktiv-media
      - AWS_USE_PATH_STYLE_ENDPOINT=true
    command: php artisan queue:work --sleep=3 --tries=3
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  # ─── PostgreSQL database ───────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: aktiv_db
    ports:
      - "5433:5432"           # Using 5433 on host to avoid conflict with other projects on 5432
    environment:
      - POSTGRES_DB=${DB_DATABASE:-aktiv}
      - POSTGRES_USER=${DB_USERNAME:-aktiv_user}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-secret}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-aktiv_user} -d ${DB_DATABASE:-aktiv}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:alpine
    container_name: aktiv_redis
    ports:
      - "6379:6379"           # Exposed for local debugging
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # ─── Mailpit (local email catcher) ────────────────────────────────────────
  # Catches all outgoing mail from Laravel in dev.
  # View caught emails at http://localhost:8025
  # No emails are actually sent during local development.
  mailpit:
    image: axllent/mailpit
    container_name: aktiv_mailpit
    ports:
      - "8025:8025"           # Web UI
      - "1025:1025"           # SMTP (Laravel points here)
    restart: unless-stopped

  # ─── MinIO (S3-compatible object storage) ────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: aktiv_minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped

  # Initializes MinIO bucket for media uploads
  minio-init:
    image: minio/mc:latest
    container_name: aktiv_minio_init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin) do echo '...waiting for minio...' && sleep 1; done;
      /usr/bin/mc mb local/aktiv-media --ignore-existing;
      /usr/bin/mc anonymous set public local/aktiv-media;
      exit 0;
      "

volumes:
  db_data:
  redis_data:
  minio_data: