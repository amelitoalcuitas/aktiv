# docker-compose.yml
services:

  # ─── Nginx reverse proxy ───────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: aktiv_nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  # ─── Nuxt 3 frontend ───────────────────────────────────────────────────────
  frontend:
    image: node:20-alpine
    container_name: aktiv_frontend
    working_dir: /app
    user: "${UID:-1000}:${GID:-1000}"
    volumes:
      - ./frontend:/app
      - ./version.json:/app/public/version.json:ro
    environment:
      - NUXT_PUBLIC_API_BASE=/api
    command: sh -c "npm install && npm run dev"
    expose:
      - "3000"
    restart: unless-stopped

  # ─── Laravel backend ───────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aktiv_backend
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
      - ./backend/.env:/var/www/.env
    expose:
      - "9000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    command: >
      sh -c "
      chown -R www-data:www-data /var/www/storage /var/www/bootstrap/cache &&
      chmod -R ug+rwX /var/www/storage /var/www/bootstrap/cache &&
      php artisan config:clear &&
      php artisan cache:clear &&
      php-fpm
      "
    restart: unless-stopped

  # ─── Laravel Reverb (WebSocket server) ────────────────────────────────────
  reverb:
    image: aktiv-backend
    container_name: aktiv_reverb
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
      - ./backend/.env:/var/www/.env
    command: >
      sh -c "
      docker-php-ext-install pcntl &&
      php artisan config:clear &&
      php artisan reverb:start --host=0.0.0.0 --port=8080 --no-interaction
      "
    ports:
      - "8081:8080"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  # ─── Laravel Queue Worker ─────────────────────────────────────────────────
  queue:
    image: aktiv-backend
    container_name: aktiv_queue
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
      - ./backend/.env:/var/www/.env
    command: php artisan queue:work --sleep=3 --tries=3
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  # ─── Laravel Scheduler ────────────────────────────────────────────────────
  scheduler:
    image: aktiv-backend
    container_name: aktiv_scheduler
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
      - ./backend/.env:/var/www/.env
    command: php artisan schedule:work
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  # ─── PostgreSQL database ───────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: aktiv_db
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_DB=${DB_DATABASE:-aktiv}
      - POSTGRES_USER=${DB_USERNAME:-aktiv_user}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-secret}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-aktiv_user} -d ${DB_DATABASE:-aktiv}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:alpine
    container_name: aktiv_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # ─── Mailpit (local email catcher) ────────────────────────────────────────
  mailpit:
    image: axllent/mailpit
    container_name: aktiv_mailpit
    ports:
      - "8025:8025"
      - "1025:1025"
    restart: unless-stopped

  # ─── MinIO (S3-compatible object storage) ────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: aktiv_minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped

  # ─── MinIO bucket init ────────────────────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: aktiv_minio_init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin) do echo '...waiting for minio...' && sleep 1; done;
      /usr/bin/mc mb local/aktiv-media --ignore-existing;
      /usr/bin/mc anonymous set public local/aktiv-media;
      exit 0;
      "

volumes:
  db_data:
  redis_data:
  minio_data:
