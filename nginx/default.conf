server {
    listen 80;
    server_name localhost;

    # ── Laravel API ──────────────────────────────────────────────────────────
    # Routes /api/* and /sanctum/* to the Laravel PHP-FPM container.
    location ~ ^/(api|sanctum)/ {
        root /var/www/public;
        try_files $uri $uri/ /index.php?$query_string;

        location ~ \.php$ {
            fastcgi_pass backend:9000;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME /var/www/public$fastcgi_script_name;
            include fastcgi_params;
        }
    }

    # ── Nuxt 3 frontend ──────────────────────────────────────────────────────
    # All other traffic proxied to the Nuxt dev server.
    # The _nuxt/ path and WebSocket upgrade are required for Nuxt HMR to work.
    location / {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;

        # Required for Nuxt HMR (hot module replacement) via WebSocket
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}