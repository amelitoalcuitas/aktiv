server {
    listen 80;
    server_name localhost;
    client_max_body_size 64M;

    # Use Docker's internal DNS so upstream hostnames are re-resolved on each
    # request rather than cached at startup — prevents 502s after container restarts.
    resolver 127.0.0.11 valid=5s;

    # ── Laravel API ──────────────────────────────────────────────────────────
    # Routes /api/* and /sanctum/* to the Laravel PHP-FPM container.
    # All Laravel requests are handled by public/index.php, so we pass directly
    # to PHP-FPM without try_files (which would internal-redirect /index.php
    # back through Nuxt's location / block and cause a 404).
    location ~ ^/(api|sanctum)/ {
        root /var/www/public;
        client_max_body_size 64M;
        set $backend_upstream backend:9000;
        fastcgi_pass $backend_upstream;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME /var/www/public/index.php;
        include fastcgi_params;
    }

    # ── MinIO object storage ─────────────────────────────────────────────────
    # Proxies /minio/ to the MinIO container so browser image requests go
    # through port 8080 instead of hitting localhost:9000 directly.
    location /minio/ {
        proxy_pass http://minio:9000/;
        proxy_set_header Host minio:9000;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Nuxt 3 frontend ──────────────────────────────────────────────────────
    # All other traffic proxied to the Nuxt dev server.
    # The _nuxt/ path and WebSocket upgrade are required for Nuxt HMR to work.
    location / {
        set $frontend_upstream http://frontend:3000;
        proxy_pass $frontend_upstream;
        proxy_http_version 1.1;

        # Required for Nuxt HMR (hot module replacement) via WebSocket
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}